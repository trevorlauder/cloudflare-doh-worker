---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: https-tcp
      port: 443
      targetPort: https-tcp
      protocol: TCP
    - name: https-udp
      port: 443
      targetPort: https-udp
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      initContainers:
        - name: gen-tls
          image: nginx:1.29.5@sha256:0236ee02dcbce00b9bd83e0f5fbc51069e7e1161bd59d99885b3ae1734f3392e
          command:
            - sh
            - -c
            - |
              openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
                -keyout /etc/nginx/ssl/tls.key -out /etc/nginx/ssl/tls.crt \
                -subj "/CN=localhost" \
                -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" \
                -quiet 2>/dev/null
          volumeMounts:
            - name: tls
              mountPath: /etc/nginx/ssl
      containers:
        - name: nginx
          image: nginx:1.29.5@sha256:0236ee02dcbce00b9bd83e0f5fbc51069e7e1161bd59d99885b3ae1734f3392e
          ports:
            - name: https-tcp
              containerPort: 443
              protocol: TCP
            - name: https-udp
              containerPort: 443
              protocol: UDP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
            - name: tls
              mountPath: /etc/nginx/ssl
          startupProbe:
            tcpSocket:
              port: 443
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 443
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: conf
          configMap:
            name: nginx-config
        - name: tls
          emptyDir: {}
