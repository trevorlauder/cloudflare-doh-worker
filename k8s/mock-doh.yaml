---
apiVersion: v1
kind: Service
metadata:
  name: mock-doh
spec:
  selector:
    app: mock-doh
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-doh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-doh
  template:
    metadata:
      labels:
        app: mock-doh
    spec:
      containers:
        - name: mock-doh
          image: k3d-doh-registry:5001/doh-worker
          command: [
            "uv",
            "run",
            "python",
            "/usr/src/app/tests/mock_doh_server.py",
          ]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /last-ecs
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 6
