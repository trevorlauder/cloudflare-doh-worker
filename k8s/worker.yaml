---
apiVersion: v1
kind: Service
metadata:
  name: worker
spec:
  selector:
    app: worker
  ports:
    - port: 8787
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: trust-nginx-cert
          image: k3d-doh-registry:5001/doh-worker
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              cp /etc/ssl/certs/ca-certificates.crt /ssl-certs/ca-certificates.crt &&
              cat /nginx-ca/ca.crt >> /ssl-certs/ca-certificates.crt
          volumeMounts:
            - name: nginx-ca
              mountPath: /nginx-ca
            - name: ssl-certs
              mountPath: /ssl-certs
      containers:
        - name: worker
          image: k3d-doh-registry:5001/doh-worker
          ports:
            - name: http
              containerPort: 8787
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 2Gi
          env:
            - name: SSL_CERT_FILE
              value: /ssl-certs/ca-certificates.crt
          volumeMounts:
            - name: ssl-certs
              mountPath: /ssl-certs
            - name: config
              mountPath: /usr/src/app/src/config.py
              subPath: config.py
            - name: dev-vars
              mountPath: /usr/src/app/.dev.vars
              subPath: .dev.vars
          startupProbe:
            httpGet:
              path: /health
              port: 8787
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: ssl-certs
          emptyDir: {}
        - name: nginx-ca
          configMap:
            name: nginx-ca
        - name: config
          configMap:
            name: worker-config
        - name: dev-vars
          configMap:
            name: worker-dev-vars
