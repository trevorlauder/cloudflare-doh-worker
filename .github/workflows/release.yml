name: deploy-branch

permissions: {}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  deploy-branch:
    name: Publish deploy branch
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the deploy branch and tags
    concurrency:
      group: deploy-branch-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install: true
          cache: false
          install_args: git-cliff

      - name: Build deploy tree
        env:
          TAG: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir /tmp/deploy

          cp -r src/          /tmp/deploy/src/
          cp wrangler.toml    /tmp/deploy/
          cp pyproject.toml   /tmp/deploy/
          cp package.json     /tmp/deploy/
          cp uv.lock          /tmp/deploy/
          cp LICENSE          /tmp/deploy/
          cp .gitignore       /tmp/deploy/
          cp mise.deploy.toml /tmp/deploy/mise.toml

          cat > /tmp/deploy/README.md << EOF
          # cloudflare-doh-worker

          This is a deploy branch. For documentation, see the README for this release:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/README.md

          Grafana dashboard for this release:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/dashboard/grafana.json

          Additional example configs:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/examples/
          EOF

      - name: Push deploy branch
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          cd /tmp/deploy

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPOSITORY}.git"

          git checkout -b deploy
          git add -A
          git commit -m "deploy: ${TAG}"

          git push origin deploy --force

          git tag "deploy-${TAG}"
          git push origin "deploy-${TAG}"

      - name: Create GitHub release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          notes=$(GITHUB_TOKEN="${GH_TOKEN}" git cliff --tag "${TAG}" --latest --strip all)
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${notes}" \
            --repo "${GH_REPOSITORY}"
