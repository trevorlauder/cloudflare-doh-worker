---
name: deploy-branch

permissions: {}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  deploy-branch:
    name: Publish deploy branch
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the deploy branch and tags
    concurrency:
      group: deploy-branch-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          install: true
          cache: false
          install_args: git-cliff

      - name: Build deploy tree
        env:
          TAG: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p /tmp/deploy/.github /tmp/deploy/scripts /tmp/deploy/blocklist

          cp -r src/ /tmp/deploy/src/
          cp -r scripts/ /tmp/deploy/scripts/
          cp -r workflows/ /tmp/deploy/.github/workflows/
          cp wrangler.toml pyproject.toml package.json uv.lock LICENSE .gitignore /tmp/deploy/
          cp mise.deploy.toml /tmp/deploy/mise.toml
          cp blocklist_sources_deploy.yaml /tmp/deploy/blocklist_sources.yaml
          touch /tmp/deploy/blocklist/.gitkeep

          cat > /tmp/deploy/README.md << EOF
          # cloudflare-doh-worker

          This is a deploy branch. For documentation, see the README for this release:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/README.md

          Grafana dashboard for this release:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/dashboard/grafana.json

          Additional example configs:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/examples/

          ## Community Block List

          Add URLs to \`blocklist_sources.yaml\` to enable community block lists:

          \`\`\`yaml
          urls:
            - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          \`\`\`

          Then download and commit the per-source files:

          \`\`\`shell
          uv run python scripts/build_blocklist.py
          git add blocklist/
          git commit -m "update blocklist"
          git push
          \`\`\`

          The bloom filter is rebuilt and uploaded to KV automatically on deploy.

          To keep lists updated automatically, uncomment the entire contents of
          \`.github/workflows/update-blocklist.yml\`. It runs weekly and opens a PR
          when any upstream list changes.

          See the full docs for details:
          https://github.com/${GH_REPOSITORY}/blob/${TAG}/README.md#community-block-list
          EOF

      - name: Push deploy branch
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          cd /tmp/deploy

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPOSITORY}.git"

          git checkout -b deploy
          git add -A
          git commit -m "deploy: ${TAG}"

          git push origin deploy --force

          git tag "deploy-${TAG}"
          git push origin "deploy-${TAG}"

      - name: Create GitHub release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          notes=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${notes}" \
            --repo "${GH_REPOSITORY}"
