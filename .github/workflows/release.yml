---
name: deploy-branch

permissions: {}

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  deploy-branch:
    name: Publish deploy branch
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the deploy branch and tags
    concurrency:
      group: deploy-branch-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          install: true
          cache: false
          install_args: git-cliff

      - name: Build deploy tree
        env:
          TAG: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p /tmp/deploy/blocklist

          cp -r src/ /tmp/deploy/src/
          cp -r scripts/ /tmp/deploy/scripts/
          cp wrangler.toml pyproject.toml package.json uv.lock LICENSE .gitignore .gitattributes /tmp/deploy/
          cp mise.deploy.toml /tmp/deploy/mise.toml
          cp blocklist_sources_deploy.yaml /tmp/deploy/blocklist_sources.yaml
          touch /tmp/deploy/blocklist/.gitkeep

          cat > /tmp/deploy/README.md << EOF
          # cloudflare-doh-worker

          This is a deploy branch. For documentation, see the [README](https://github.com/${GH_REPOSITORY}/blob/${TAG}/README.md) for this release.

          [Grafana dashboard](https://github.com/${GH_REPOSITORY}/blob/${TAG}/dashboard/grafana.json) for this release.

          [Additional example configs](https://github.com/${GH_REPOSITORY}/blob/${TAG}/examples/).

          ## Community Block List

          Add URLs to \`blocklist_sources.yaml\` to enable community block lists:

          \`\`\`yaml
          urls:
            - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          \`\`\`

          Then download and commit the per-source files:

          \`\`\`shell
          uv run python scripts/build_blocklist.py
          git add blocklist_sources.yaml blocklist/
          git commit -m "update blocklist"
          git push
          \`\`\`

          The bloom filter is rebuilt and uploaded to KV automatically on deploy.

          To keep lists updated automatically, you can use the [sample workflow](https://github.com/${GH_REPOSITORY}/blob/${TAG}/workflows/update-blocklist.yml).

          See the [full docs](https://github.com/${GH_REPOSITORY}/blob/${TAG}/README.md#community-block-list) for details.
          EOF

      - name: Push deploy branch
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          cd /tmp/deploy

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPOSITORY}.git"

          git checkout -b deploy
          git add -A
          git commit -m "deploy: ${TAG}"

          git push origin deploy --force

          git tag "deploy-${TAG}"
          git push origin "deploy-${TAG}"

      - name: Create GitHub release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          notes=$(git cliff --latest --strip header)

          prerelease_flag=""
          if [[ "${TAG}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${notes}" \
            ${prerelease_flag} \
            --repo "${GH_REPOSITORY}"
