[changelog]
header = "# Changelog\n\n"

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% if commits | filter(attribute="breaking", value=true) | length > 0 %}
### ⚠ Breaking Changes
{% for commit in commits | filter(attribute="breaking", value=true) %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/trevorlauder/cloudflare-doh-worker/pull/{{ commit.remote.pr_number }})){% endif %}\
{% endfor %}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/trevorlauder/cloudflare-doh-worker/pull/{{ commit.remote.pr_number }})){% endif %}\
{% endfor %}
{% endfor %}\n
"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_changes = true

commit_preprocessors = [
  { pattern = '\n[\s\S]*', replace = "" },
  { pattern = '\(#\d+\)', replace = "" },
  { pattern = '\.+$', replace = "" },
]

commit_parsers = [
  { message = "^Merge", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs?", group = "Documentation" },
  { message = "^tests?", group = "Testing" },
  { message = "^build", group = "Build" },
  { message = "^style", group = "Style" },
  { message = "^chore\\(deps\\)|^Bump |^bump ", group = "Dependencies" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^ci|^CI", group = "CI" },
  { message = ".*", group = "Changes" },
]

filter_commits = false
tag_pattern = "[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"

[remote.github]
owner = "trevorlauder"
repo = "cloudflare-doh-worker"
