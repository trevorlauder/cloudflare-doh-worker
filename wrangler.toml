name = "doh"
workers_dev = false
preview_urls = false
send_metrics = false

compatibility_date = "2026-02-24"
compatibility_flags = ["python_workers"]

# Use a custom route if you have your own domain on Cloudflare
routes = [
  "www.mydomain.com/top/level/path/to/entrypoints/*",
]

main = "worker/main.py"

[observability]
[observability.logs]
enabled = false
invocation_logs = false

[vars]
# Secrets managed outside of the file
# Run `npx wrangler secret put <NAME>` for each of these
# - LOKI_URL          (Grafana Loki push endpoint URL)
# - LOKI_USERNAME
# - LOKI_PASSWORD
# - ADMIN_TOKEN       (required to enable /config endpoint)
